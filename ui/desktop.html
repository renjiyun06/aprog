<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aprog · 桌面</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ─── desktop wallpaper + shortcut icons (top-left, Win11 style) ─ -->
<main class="desktop" data-od-id="desktop">

  <div class="dt-icons" data-od-id="dt-icons">

    <!-- 此电脑 (This PC) -->
    <button class="dt-icon" title="此电脑" data-od-id="dt-pc">
      <div class="dt-icon-art sys-pc">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="24" height="16" rx="1.5"/>
          <path d="M11 25 H19 M15 21 V25 M8 25 H22"/>
        </svg>
      </div>
      <div class="dt-icon-label">此电脑</div>
    </button>

    <!-- 回收站 (Recycle Bin) -->
    <button class="dt-icon" title="回收站" data-od-id="dt-recyclebin">
      <div class="dt-icon-art sys-recyclebin">
        <svg width="28" height="30" viewBox="0 0 28 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7 H25"/>
          <path d="M10 4 H18 V7 H10 Z"/>
          <path d="M5 7 L7 26 a1.5 1.5 0 0 0 1.5 1.5 H19.5 a1.5 1.5 0 0 0 1.5 -1.5 L23 7"/>
          <path d="M11 12 V23 M14 12 V23 M17 12 V23"/>
        </svg>
      </div>
      <div class="dt-icon-label">回收站</div>
    </button>

    <!-- codereviewer shortcut -->
    <a href="program-window.html" class="dt-icon" title="codereviewer · 2 attached" data-od-id="dt-codereviewer">
      <div class="dt-icon-art app-codereviewer">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 8 L4 15 L10 22"/>
          <path d="M20 8 L26 15 L20 22"/>
          <path d="M18 7 L12 23"/>
        </svg>
        <span class="shortcut-arrow">↗</span>
      </div>
      <div class="dt-icon-label">codereviewer</div>
    </a>

    <!-- docs-writer shortcut -->
    <button class="dt-icon" title="docs-writer" data-od-id="dt-docswriter">
      <div class="dt-icon-art app-docswriter">
        <svg width="28" height="30" viewBox="0 0 28 30" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3 H17 L24 10 V27 H5 Z"/>
          <path d="M17 3 V10 H24"/>
          <path d="M9 15 H20 M9 19 H20 M9 23 H16"/>
        </svg>
        <span class="shortcut-arrow">↗</span>
      </div>
      <div class="dt-icon-label">docs-writer</div>
    </button>

    <!-- planner shortcut -->
    <button class="dt-icon" title="planner · 等待审批" data-od-id="dt-planner">
      <div class="dt-icon-art app-planner">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="7" height="7" rx="1"/>
          <rect x="3" y="18" width="7" height="7" rx="1"/>
          <path d="M4.5 8.5 L6.2 10.2 L8.5 6.5"/>
          <path d="M13 8.5 H26 M13 21.5 H26 M13 12 H22 M13 25 H22"/>
        </svg>
        <span class="shortcut-arrow">↗</span>
      </div>
      <div class="dt-icon-label">planner</div>
    </button>

    <!-- Snapshots folder -->
    <button class="dt-icon" title="Snapshots · 12 进程快照" data-od-id="dt-snapshots">
      <div class="dt-icon-art sys-folder">
        <svg width="30" height="26" viewBox="0 0 30 26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8 V22 a1.5 1.5 0 0 0 1.5 1.5 H25.5 a1.5 1.5 0 0 0 1.5 -1.5 V10.5 a1.5 1.5 0 0 0 -1.5 -1.5 H14 L11 6 H4.5 a1.5 1.5 0 0 0 -1.5 1.5 z"/>
        </svg>
      </div>
      <div class="dt-icon-label">Snapshots</div>
    </button>

    <!-- README.txt -->
    <button class="dt-icon" title="README.txt" data-od-id="dt-readme">
      <div class="dt-icon-art sys-text">
        <svg width="26" height="30" viewBox="0 0 26 30" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 3 H16 L22 9 V27 H4 Z"/>
          <path d="M16 3 V9 H22"/>
          <path d="M8 14 H18 M8 18 H18 M8 22 H14"/>
        </svg>
      </div>
      <div class="dt-icon-label">README.txt</div>
    </button>

  </div>

</main>

<!-- ─── Win11 taskbar (bottom) ───────────────────────────────────── -->
<footer class="taskbar" data-od-id="taskbar">

  <!-- centered group: Start + Search + Task View + pinned apps -->
  <div class="tb-main">

    <!-- Start (real Win11 logo — 4 leaning parallelograms) -->
    <button class="tb-btn" title="开始 ⊞" data-od-id="tb-start">
      <svg viewBox="0 0 88 88" stroke="none" fill="currentColor">
        <path d="M0,12.402 L35.687,7.5 L35.703,41.922 L0.033,42.125 Z"/>
        <path d="M0,45.176 L35.67,45.378 L35.687,79.812 L0.034,84.5 Z"/>
        <path d="M40,7 L87.314,0 L87.314,41.557 L40,41.91 Z"/>
        <path d="M40,45.65 L87.314,45.7 L87.302,87.27 L40,80.6 Z"/>
      </svg>
      <span class="tip">开始</span>
    </button>

    <!-- Search -->
    <button class="tb-btn" title="搜索">
      <svg viewBox="0 0 18 18"><circle cx="8" cy="8" r="4.5"/><path d="M11.5 11.5 L15.5 15.5"/></svg>
      <span class="tip">搜索</span>
    </button>

    <!-- Task View -->
    <button class="tb-btn" title="任务视图 ⊞+Tab">
      <svg viewBox="0 0 18 18"><rect x="2" y="3" width="9" height="9" rx="1"/><rect x="7" y="6" width="9" height="9" rx="1"/></svg>
      <span class="tip">任务视图</span>
    </button>

    <div class="tb-divider"></div>

    <!-- aprog pinned programs (apps installed) -->
    <a href="program-window.html" class="tb-app is-running" title="codereviewer · 2 attached">
      <div class="tile app-codereviewer">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4 L2 8 L5 12"/>
          <path d="M11 4 L14 8 L11 12"/>
          <path d="M9.5 3.5 L6.5 12.5"/>
        </svg>
      </div>
      <span class="indicator"></span>
      <span class="tip">codereviewer · 2 attached</span>
    </a>

    <div class="tb-app is-running" title="docs-writer · 1 running">
      <div class="tile app-docswriter">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3.5 2 H9.5 L13 5.5 V14 H3.5 Z"/>
          <path d="M9.5 2 V5.5 H13"/>
          <path d="M5.5 8.5 H10.5 M5.5 11 H9"/>
        </svg>
      </div>
      <span class="indicator"></span>
      <span class="tip">docs-writer · 1 running</span>
    </div>

    <div class="tb-app is-running" title="bug-hunter · 1 hibernating">
      <div class="tile app-bughunter">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="8" cy="9" rx="3.5" ry="4.5"/>
          <path d="M8 4.5 V3 M6 5 L5 3 M10 5 L11 3"/>
          <path d="M4.5 8 L2.5 7 M11.5 8 L13.5 7 M4.5 11 L2.5 12 M11.5 11 L13.5 12"/>
          <path d="M8 9 V13"/>
        </svg>
      </div>
      <span class="indicator"></span>
      <span class="tip">bug-hunter · 1 hibernating</span>
    </div>

    <div class="tb-app is-running" title="planner · 等待审批">
      <div class="tile app-planner">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="3.5" height="3.5" rx="0.5"/>
          <rect x="2" y="9.5" width="3.5" height="3.5" rx="0.5"/>
          <path d="M2.8 4.5 L3.7 5.4 L4.8 3.5"/>
          <path d="M7 4.5 H13.5 M7 11 H13.5"/>
        </svg>
      </div>
      <span class="indicator"></span>
      <span class="tip">planner · 等待审批</span>
    </div>

    <div class="tb-app" title="researcher">
      <div class="tile app-researcher">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2.5 H13 V13.5 H3 Z"/>
          <path d="M3 2.5 V13.5 L4.5 12.3 L6 13.5 V2.5"/>
          <path d="M8 6 H12 M8 8.5 H11"/>
        </svg>
      </div>
      <span class="indicator"></span>
      <span class="tip">researcher</span>
    </div>

    <div class="tb-divider"></div>

    <!-- system apps -->
    <div class="tb-app" title="Files.aprog">
      <div class="tile sys-files">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 5 L2 13 a1 1 0 0 0 1 1 H13 a1 1 0 0 0 1 -1 V6.5 a1 1 0 0 0 -1 -1 H8 L6.5 4 H3 a1 1 0 0 0 -1 1 z"/>
        </svg>
      </div>
      <span class="tip">Files</span>
    </div>

    <div class="tb-app" title="活动监视器">
      <div class="tile sys-activity">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round" stroke="#6ccb5f" stroke-width="1.8">
          <path d="M2 12 L5 7 L8 10 L11 4 L14 8"/>
          <path d="M2 14 H14" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        </svg>
      </div>
      <span class="tip">活动监视器</span>
    </div>

    <div class="tb-app" title="终端">
      <div class="tile sys-terminal">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5 L6 8 L3 11"/>
          <path d="M8 11 H13"/>
        </svg>
      </div>
      <span class="tip">终端</span>
    </div>

    <div class="tb-app" title="aprog Store">
      <div class="tile sys-store">
        <svg viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5 H13 L12 14 H4 Z"/>
          <path d="M5.5 5 V4 a2.5 2.5 0 0 1 5 0 V5"/>
        </svg>
      </div>
      <span class="tip">Store</span>
    </div>

  </div>

  <!-- ─── system tray (far right) ─────────────────────────────── -->
  <div class="tb-tray" data-od-id="system-tray">

    <!-- aprog-specific tray indicators (sandbox + devices) — like Slack/Bartender style menubar items in Win11 tray -->
    <button class="tb-tray-btn" title="Sandbox 池 · 7/16 在用">
      <svg viewBox="0 0 18 18"><rect x="3" y="3" width="12" height="12" rx="2.5"/><path d="M3 9 H15 M9 3 V15"/></svg>
      <span class="mono" style="font-size:11.5px;">7/16</span>
    </button>

    <button class="tb-tray-btn" title="2 台设备在线">
      <svg viewBox="0 0 18 18"><rect x="2.5" y="4" width="13" height="8" rx="1.2"/><path d="M5.5 15.5 H12.5"/></svg>
    </button>

    <!-- language indicator -->
    <button class="tb-tray-btn lang" title="输入法 · 中文">CH</button>

    <!-- quick settings cluster: wifi + volume + battery -->
    <button class="tb-tray-btn" title="网络 / 声音 / 电池">
      <svg viewBox="0 0 16 14"><path d="M1 4 a10 10 0 0 1 14 0"/><path d="M3.5 7 a6 6 0 0 1 9 0"/><path d="M6 10 a3 3 0 0 1 4 0"/><circle cx="8" cy="12" r="0.8" fill="currentColor" stroke="none"/></svg>
      <svg viewBox="0 0 16 16"><path d="M2.5 6 H5 L8.5 3 V13 L5 10 H2.5 Z"/></svg>
      <svg viewBox="0 0 22 12"><rect x="1" y="2" width="17" height="8" rx="1.6"/><rect x="2.5" y="3.5" width="11" height="5" rx="0.4" fill="currentColor" stroke="none"/><rect x="19" y="4.5" width="1.4" height="3" rx="0.4" fill="currentColor" stroke="none"/></svg>
    </button>

    <!-- clock -->
    <div class="tb-clock" title="6月1日 周日">
      <span class="time">15:19</span>
      <span class="date">2026/6/1</span>
    </div>

    <!-- notification -->
    <button class="tb-tray-btn" title="通知中心">
      <svg viewBox="0 0 16 16"><path d="M4 12 V8 a4 4 0 0 1 8 0 V12 L13 13 H3 Z"/><path d="M6.5 13 a1.7 1.7 0 0 0 3 0"/></svg>
    </button>

  </div>
</footer>

</body>
</html>
